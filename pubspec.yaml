name: soli
description: "Soli - 情感伴侣应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  provider: ^6.1.2
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 工具类
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # 图片选择
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  path: ^1.9.0
  http: ^1.5.0
  url_launcher: ^6.3.2
  
  # 内购
  in_app_purchase: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/