<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florsovivexa App 高保真原型</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Custom Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* Dark background for the page */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        /* Define brand colors for Tailwind */
        .bg-brand-dark { background-color: #0F1520; }
        .bg-brand-teal { background-color: #44D7D0; }
        .text-brand-teal { color: #44D7D0; }
        .border-brand-teal { border-color: #44D7D0; }
        
        /* Custom gradient background */
        .bg-brand-gradient {
            background-image: linear-gradient(180deg, #0F1520, #000000);
        }

        /* iPhone 15 Pro dimensions: 393 x 852 pixels */
        .iphone-frame {
            width: 393px;
            height: 852px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0,0,0,0.3);
            border: 12px solid #1c1c1e;
            border-radius: 54px; /* More realistic corner radius */
            position: relative;
            overflow: hidden; /* This is crucial for containing the content */
            display: flex;
            flex-direction: column;
        }
        
        .iphone-screen {
            background-color: #0F1520;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto; /* Allow scrolling through screens */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .iphone-screen::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome, Safari and Opera */
        }

        /* iOS Status Bar with Dynamic Island */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            padding: 0 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        .status-bar .time {
            font-weight: 600;
            font-size: 15px;
        }
        .status-bar .island {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 12px;
            width: 120px;
            height: 32px;
            background-color: #1c1c1e;
            border-radius: 16px;
        }
        .status-bar .icons {
            display: flex;
            gap: 6px;
            font-size: 14px;
        }

        /* iOS Bottom Tab Bar */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 84px;
            background-color: rgba(28, 28, 30, 0.85); /* Translucent background */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 10px;
            z-index: 50;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #8e8e93;
            cursor: pointer;
        }
        .tab-item.active {
            color: #44D7D0;
        }
        .tab-item i {
            font-size: 22px;
            width: 28px; /* Ensure icons have same width */
            text-align: center;
        }

        /* Home indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background-color: white;
            border-radius: 2.5px;
        }
        
        /* Custom card style for a frosted glass effect */
        .glass-card {
            background-color: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gray-900">

    <!-- iPhone 15 Pro Frame -->
    <div class="iphone-frame">
        <div class="iphone-screen bg-brand-gradient">
            
            <!-- iOS Status Bar -->
            <div class="status-bar">
                <div class="time">9:41</div>
                <div class="island"></div>
                <div class="icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <!-- App Content - All screens are laid out vertically -->
            <main class="flex-1 overflow-y-auto pb-24 pt-12">
                
                <!-- Screen 1: 照片截图 (Photo Editor) -->
                <section id="photo-editor" class="h-full flex flex-col p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <h1 class="text-3xl font-bold text-white">创作工坊</h1>
                        <button class="text-white text-lg"><i class="fas fa-cog"></i></button>
                    </div>
                    
                    <div class="flex-1 bg-black rounded-3xl overflow-hidden relative group">
                        <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?q=80&w=1974&auto=format&fit=crop" class="w-full h-full object-cover" alt="[一位男士的肖像]">
                        <div class="absolute inset-0 bg-black bg-opacity-20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="absolute" style="top: 20%; left: 60%; transform: rotate(15deg) scale(1.2);"><span class="text-5xl drop-shadow-lg">✨</span></div>
                            <div class="absolute" style="bottom: 15%; left: 15%; transform: rotate(-10deg);"><span class="text-6xl drop-shadow-lg">😂</span></div>
                            <div class="text-white text-center p-4 rounded-lg glass-card">
                                <p class="font-semibold">三指轻点以编辑贴纸</p>
                                <p class="text-sm opacity-80">双指开合进行裁切</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between space-x-3">
                        <button class="flex-1 py-3 px-4 bg-brand-teal text-black font-bold rounded-full shadow-lg shadow-brand-teal/30"><i class="fas fa-save mr-2"></i>保存</button>
                        <button class="w-16 h-12 glass-card rounded-2xl text-white text-xl flex items-center justify-center"><i class="fas fa-crop-alt"></i></button>
                        <button class="w-16 h-12 glass-card rounded-2xl text-white text-xl flex items-center justify-center"><i class="far fa-grin-beam"></i></button>
                    </div>
                </section>

                <!-- Screen 2: 好事发生 (Good Things Journal) -->
                <section id="journal" class="h-full flex flex-col p-4 space-y-4 relative">
                     <div class="flex justify-between items-center">
                        <h1 class="text-3xl font-bold text-white">好事发生</h1>
                        <p class="text-brand-teal font-semibold">7天连载中 🔥</p>
                    </div>
                    <p class="text-gray-400">记录美好，吸引好运。你的记忆花园正在悄然生长。</p>

                    <div class="flex-1 rounded-3xl relative overflow-hidden p-4 flex flex-col justify-end glass-card">
                        <div class="absolute -bottom-1/4 -left-1/4 w-1/2 h-1/2 bg-brand-teal/10 rounded-full filter blur-3xl"></div>
                        <div class="absolute -top-1/4 -right-1/4 w-2/3 h-2/3 bg-purple-500/10 rounded-full filter blur-3xl"></div>
                        
                        <div class="space-y-3 z-10">
                            <div class="p-4 rounded-xl bg-white/10 border border-white/20 shadow-lg"><p class="font-semibold text-white">今天项目汇报超常发挥！</p><p class="text-xs text-gray-300 mt-1">下午 2:30 · <span class="text-brand-teal">#成就</span></p></div>
                            <div class="p-4 rounded-xl bg-white/10 border border-white/20 shadow-lg"><p class="font-semibold text-white">楼下的猫咪主动蹭我了，好治愈。</p><p class="text-xs text-gray-300 mt-1">上午 9:15 · <span class="text-brand-teal">#小确幸</span></p></div>
                            <div class="p-4 rounded-xl bg-white/10 border border-white/20 shadow-lg"><p class="font-semibold text-white">收到了朋友从远方寄来的明信片。</p><p class="text-xs text-gray-300 mt-1">昨天 · <span class="text-brand-teal">#温暖</span></p></div>
                        </div>
                    </div>
                    
                    <button class="absolute bottom-28 right-8 w-16 h-16 bg-brand-teal rounded-full flex items-center justify-center text-black text-3xl shadow-2xl shadow-brand-teal/40 transform hover:scale-110 transition-transform"><i class="fas fa-plus"></i></button>
                </section>

                <!-- Screen 3: 奶茶记 (Bubble Tea Tracker) -->
                <section id="tea-tracker" class="h-full flex flex-col p-4 space-y-4">
                     <div class="flex justify-between items-center">
                        <h1 class="text-3xl font-bold text-white">奶茶记</h1>
                        <button class="text-white text-lg"><i class="fas fa-chart-pie"></i></button>
                    </div>
                    <p class="text-gray-400">你的甜蜜日常，每一杯都值得记录。</p>

                    <div class="p-6 rounded-3xl glass-card flex justify-around items-center text-center">
                        <div><p class="text-3xl font-bold text-white">12<span class="text-lg ml-1">杯</span></p><p class="text-sm text-gray-400">本月记录</p></div>
                        <div class="w-px h-12 bg-white/20"></div>
                        <div><p class="text-3xl font-bold text-white">¥258</p><p class="text-sm text-gray-400">本月消费</p></div>
                    </div>

                    <div class="flex-1 space-y-3">
                        <h2 class="text-lg font-semibold text-white">最近记录</h2>
                        <div class="flex items-center p-3 rounded-2xl bg-white/5">
                            <div class="w-14 h-14 rounded-xl bg-gray-700 flex items-center justify-center mr-4 text-brand-teal text-2xl">
                                <i class="fas fa-wine-glass"></i>
                            </div>
                            <div class="flex-1"><p class="font-semibold text-white">多肉葡萄</p><p class="text-sm text-gray-400">喜茶 · ¥29</p></div>
                            <div class="text-right"><div class="text-yellow-400"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i></div><p class="text-xs text-gray-500">2小时前</p></div>
                        </div>
                        <div class="flex items-center p-3 rounded-2xl bg-white/5">
                            <div class="w-14 h-14 rounded-xl bg-gray-700 flex items-center justify-center mr-4 text-brand-teal text-2xl">
                                <i class="fas fa-coffee"></i>
                            </div>
                            <div class="flex-1"><p class="font-semibold text-white">生椰拿铁</p><p class="text-sm text-gray-400">瑞幸咖啡 · ¥18</p></div>
                            <div class="text-right"><div class="text-yellow-400"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i></div><p class="text-xs text-gray-500">昨天</p></div>
                        </div>
                    </div>
                    
                    <button class="w-full py-4 bg-brand-teal text-black font-bold rounded-full shadow-lg shadow-brand-teal/30"><i class="fas fa-plus mr-2"></i>上滑“倒入”一杯新记录</button>
                </section>

                <!-- Screen 4: 设置 (Settings) -->
                <section id="settings" class="h-full flex flex-col p-4 space-y-6">
                    <h1 class="text-3xl font-bold text-white">设置</h1>
                    
                    <div class="space-y-4">
                        <div class="p-5 rounded-2xl glass-card flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fas fa-user-circle text-brand-teal w-6 text-xl mr-4"></i>
                                <span class="text-white font-medium">个人资料</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-500"></i>
                        </div>
                        <div class="p-5 rounded-2xl glass-card flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fas fa-bell text-brand-teal w-6 text-xl mr-4"></i>
                                <span class="text-white font-medium">通知设置</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-500"></i>
                        </div>
                        <div class="p-5 rounded-2xl glass-card flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fas fa-palette text-brand-teal w-6 text-xl mr-4"></i>
                                <span class="text-white font-medium">外观</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-500"></i>
                        </div>
                        <div class="p-5 rounded-2xl glass-card flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fas fa-info-circle text-brand-teal w-6 text-xl mr-4"></i>
                                <span class="text-white font-medium">关于我们</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-500"></i>
                        </div>
                    </div>

                    <div class="flex-1"></div> <!-- Spacer -->

                    <button class="w-full py-3 bg-red-500/20 text-red-400 font-bold rounded-full">
                        退出登录
                    </button>
                </section>
            </main>

            <!-- iOS Tab Bar -->
            <div class="tab-bar">
                <div href="#photo-editor" class="tab-item active">
                    <i class="fas fa-camera-retro"></i>
                    <span>创作</span>
                </div>
                <div href="#journal" class="tab-item">
                    <i class="fas fa-feather-alt"></i>
                    <span>好事</span>
                </div>
                <div href="#tea-tracker" class="tab-item">
                    <i class="fas fa-mug-hot"></i>
                    <span>茶记</span>
                </div>
                <div href="#settings" class="tab-item">
                    <i class="fas fa-user"></i>
                    <span>我的</span>
                </div>
                <div class="home-indicator"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.tab-item');
            const mainContent = document.querySelector('main');
            const sections = document.querySelectorAll('main > section');

            // Function to handle tab switching
            function switchTab(targetId) {
                // Update active tab style
                tabs.forEach(t => t.classList.remove('active'));
                const activeTab = document.querySelector(`.tab-item[href="${targetId}"]`);
                if (activeTab) {
                    activeTab.classList.add('active');
                }

                // Smooth scroll to the corresponding section
                const targetSection = document.querySelector(targetId);
                if (targetSection) {
                    const offsetTop = targetSection.offsetTop - document.querySelector('.status-bar').offsetHeight;
                    mainContent.scrollTo({
                        top: offsetTop,
                        behavior: 'smooth'
                    });
                }
            }
            
            // Add click listeners to tabs
            tabs.forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    switchTab(targetId);
                });
            });

            // Update active tab based on scroll position
            let scrollTimeout;
            mainContent.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    let current = '';
                    sections.forEach(section => {
                        const sectionTop = section.offsetTop - 100; // offset for better accuracy
                        if (mainContent.scrollTop >= sectionTop) {
                            current = '#' + section.getAttribute('id');
                        }
                    });

                    tabs.forEach(tab => {
                        tab.classList.remove('active');
                        if (tab.getAttribute('href') === current) {
                            tab.classList.add('active');
                        }
                    });
                }, 100);
            });

            // Set initial state
            switchTab('#photo-editor');
        });
    </script>

</body>
</html>
