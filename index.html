<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membly - Data Repair Protocol</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Tailwind Config for Custom Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#1A1D26', // Main Background
                        slate: '#353B48',    // Card Back
                        electric: '#6C5CE7', // Primary Action
                        mint: '#00CEC9',     // Accent/Highlight
                        mica: '#DFE6E9',     // Text
                        danger: '#FF4757',   // Error/Time low
                    },
                    fontFamily: {
                        tech: ['Rajdhani', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
        
        /* Card Flip 3D Effect */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Neon Glow Effects */
        .glow-text { text-shadow: 0 0 10px rgba(108, 92, 231, 0.5); }
        .glow-box { box-shadow: 0 0 20px rgba(0, 206, 201, 0.2); }
        .glow-card-active { box-shadow: 0 0 15px rgba(0, 206, 201, 0.6); }
        
        /* Floating Particles Background */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 50%;
        }

        /* Disable selection */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4 font-body text-mica overflow-hidden">

    <!-- iPhone 15 Pro Frame -->
    <div class="relative w-[390px] h-[844px] bg-midnight rounded-[50px] border-[8px] border-[#2d2d2d] shadow-2xl overflow-hidden ring-1 ring-white/10 relative no-select">
        
        <!-- Dynamic Island / Notch -->
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-[120px] h-[35px] bg-black rounded-b-[20px] z-50 flex items-center justify-center">
            <div class="w-2 h-2 rounded-full bg-[#1a1a1a] ml-2"></div>
        </div>

        <!-- Status Bar Time -->
        <div class="absolute top-3 left-8 text-xs font-bold text-white z-40" id="real-time">09:41</div>
        <!-- Status Bar Icons -->
        <div class="absolute top-3 right-8 flex gap-1.5 z-40">
            <i class="fas fa-signal text-[10px]"></i>
            <i class="fas fa-wifi text-[10px]"></i>
            <i class="fas fa-battery-full text-[10px]"></i>
        </div>

        <!-- Animated Background Particles -->
        <div class="particles" id="particles-container"></div>

        <!-- ========================================= -->
        <!-- SCREEN: HOME -->
        <!-- ========================================= -->
        <div id="screen-home" class="absolute inset-0 flex flex-col items-center justify-center z-10 transition-opacity duration-500 bg-midnight/90 backdrop-blur-sm">
            <div class="mb-12 text-center animate-float">
                <div class="w-20 h-20 bg-gradient-to-br from-electric to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg glow-box">
                    <i class="fas fa-microchip text-4xl text-white"></i>
                </div>
                <h1 class="text-5xl font-tech font-bold tracking-widest text-white glow-text mb-1">MEMBLY</h1>
                <p class="text-sm text-mint tracking-widest uppercase opacity-80">Data Repair Protocol</p>
            </div>

            <div class="space-y-4 w-64">
                <button onclick="game.startLevel(1)" class="w-full h-14 bg-electric hover:bg-[#5a4bd1] text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-3 group">
                    <span class="uppercase tracking-wider font-tech text-lg">Initiate</span>
                    <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                </button>

                <div class="flex gap-4">
                    <button class="flex-1 h-12 bg-slate hover:bg-gray-600 rounded-xl flex items-center justify-center text-mica transition-colors">
                        <i class="fas fa-trophy text-lg"></i>
                    </button>
                    <button class="flex-1 h-12 bg-slate hover:bg-gray-600 rounded-xl flex items-center justify-center text-mica transition-colors">
                        <i class="fas fa-cog text-lg"></i>
                    </button>
                </div>
            </div>
            
            <div class="absolute bottom-10 text-xs text-gray-500 font-tech">v1.0.4 // SYNC: ONLINE</div>
        </div>

        <!-- ========================================= -->
        <!-- SCREEN: GAME -->
        <!-- ========================================= -->
        <div id="screen-game" class="absolute inset-0 z-20 hidden flex flex-col bg-midnight">
            <!-- Header HUD -->
            <div class="pt-14 px-6 pb-4 flex justify-between items-end bg-gradient-to-b from-midnight via-midnight to-transparent z-30">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Sector</p>
                    <h2 class="text-2xl font-tech font-bold text-white" id="level-display">LVL 01</h2>
                </div>
                
                <!-- Timer Bar Container -->
                <div class="flex-1 mx-6 pb-1">
                     <div class="flex justify-between text-[10px] text-mint mb-1 font-tech">
                        <span>SYNC STABILITY</span>
                        <span id="timer-text">60s</span>
                     </div>
                     <div class="w-full h-2 bg-slate rounded-full overflow-hidden">
                         <div id="timer-bar" class="h-full bg-gradient-to-r from-mint to-electric w-full transition-all duration-1000 ease-linear"></div>
                     </div>
                </div>

                <button onclick="game.togglePause()" class="w-10 h-10 rounded-full bg-slate flex items-center justify-center text-white hover:text-mint transition-colors">
                    <i class="fas fa-pause text-sm"></i>
                </button>
            </div>

            <!-- Game Area -->
            <div class="flex-1 relative flex items-center justify-center px-4 pb-8 overflow-hidden">
                <!-- Combo Text -->
                <div id="combo-indicator" class="absolute top-4 left-1/2 transform -translate-x-1/2 text-electric font-tech font-bold text-3xl opacity-0 pointer-events-none z-50 transition-all">
                    COMBO x2!
                </div>

                <!-- Grid Container -->
                <div id="game-grid" class="grid gap-3 w-full max-w-[340px] mx-auto perspective-1000 transition-all duration-500">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Footer HUD -->
            <div class="h-16 bg-slate/30 backdrop-blur flex items-center justify-between px-8 border-t border-white/5">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-gray-400 uppercase font-bold">Pairs</span>
                    <span class="font-tech text-lg text-white" id="pairs-display">0/6</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-gray-400 uppercase font-bold">Moves</span>
                    <span class="font-tech text-lg text-white" id="moves-display">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-gray-400 uppercase font-bold">Score</span>
                    <span class="font-tech text-lg text-mint" id="score-display">0</span>
                </div>
            </div>
        </div>

        <!-- ========================================= -->
        <!-- MODAL: RESULT -->
        <!-- ========================================= -->
        <div id="modal-result" class="absolute inset-0 z-50 hidden bg-midnight/95 backdrop-blur-md flex items-center justify-center opacity-0 transition-opacity duration-300">
            <div class="w-[85%] bg-slate rounded-3xl p-6 border border-white/10 shadow-2xl text-center relative overflow-hidden">
                <!-- Decorative background glow -->
                <div class="absolute -top-10 -left-10 w-40 h-40 bg-electric/20 rounded-full blur-3xl"></div>
                
                <div class="relative z-10">
                    <div id="result-icon" class="w-16 h-16 rounded-full bg-midnight border-2 border-mint mx-auto flex items-center justify-center mb-4 animate-pop">
                        <i class="fas fa-check text-2xl text-mint"></i>
                    </div>
                    
                    <h2 id="result-title" class="text-3xl font-tech font-bold text-white mb-1">DATA RESTORED</h2>
                    <p id="result-subtitle" class="text-xs text-gray-400 mb-6 uppercase tracking-widest">Level Complete</p>
                    
                    <!-- Stars -->
                    <div class="flex justify-center gap-2 mb-6" id="star-container">
                        <i class="fas fa-star text-gray-600 text-xl"></i>
                        <i class="fas fa-star text-gray-600 text-xl"></i>
                        <i class="fas fa-star text-gray-600 text-xl"></i>
                    </div>

                    <!-- Stats Grid -->
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-midnight/50 p-3 rounded-xl">
                            <div class="text-[10px] text-gray-500 uppercase">Time Remaining</div>
                            <div class="text-lg font-tech text-white" id="result-time">42s</div>
                        </div>
                        <div class="bg-midnight/50 p-3 rounded-xl">
                            <div class="text-[10px] text-gray-500 uppercase">Total Score</div>
                            <div class="text-lg font-tech text-electric" id="result-score">1,250</div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <button onclick="game.nextLevel()" id="btn-next" class="w-full h-12 bg-mint hover:bg-[#00b5b0] text-midnight font-bold rounded-xl transition-colors uppercase font-tech tracking-wider">
                            Next Sector
                        </button>
                        <button onclick="game.retryLevel()" class="w-full h-12 bg-white/5 hover:bg-white/10 text-white rounded-xl transition-colors uppercase font-tech tracking-wider text-sm">
                            Retry
                        </button>
                        <button onclick="game.goHome()" class="text-xs text-gray-400 hover:text-white py-2">Return to Base</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pause Overlay -->
        <div id="modal-pause" class="absolute inset-0 z-40 hidden bg-midnight/95 backdrop-blur flex flex-col items-center justify-center">
            <h2 class="text-3xl font-tech text-white mb-8">SYSTEM PAUSED</h2>
            <button onclick="game.togglePause()" class="w-16 h-16 bg-electric rounded-full flex items-center justify-center text-white text-xl shadow-lg mb-4">
                <i class="fas fa-play pl-1"></i>
            </button>
            <button onclick="game.goHome()" class="text-gray-400 text-sm">Abort Mission</button>
        </div>

        <!-- Home Indicator -->
        <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-[130px] h-[5px] bg-white/20 rounded-full z-50"></div>
    </div>

    <!-- ========================================= -->
    <!-- JAVASCRIPT LOGIC -->
    <!-- ========================================= -->
    <script>
        // --- Game Configuration & Data ---
        const CONFIG = {
            levels: [
                { id: 1, name: "Departure", rows: 3, cols: 4, time: 45, pairs: 6 },
                { id: 2, name: "Exploration", rows: 4, cols: 4, time: 60, pairs: 8 },
                { id: 3, name: "Deep Dive", rows: 5, cols: 4, time: 90, pairs: 10 },
                { id: 4, name: "The Maze", rows: 6, cols: 4, time: 100, pairs: 12 },
                { id: 5, name: "Abyss", rows: 6, cols: 5, time: 120, pairs: 15 },
            ],
            icons: [
                'fa-ghost', 'fa-puzzle-piece', 'fa-microchip', 'fa-gamepad', 
                'fa-robot', 'fa-rocket', 'fa-atom', 'fa-brain', 'fa-bolt',
                'fa-dna', 'fa-fingerprint', 'fa-globe', 'fa-satellite', 
                'fa-meteor', 'fa-user-astronaut', 'fa-virus', 'fa-bug', 'fa-code'
            ],
            colors: [
                'text-yellow-400', 'text-pink-500', 'text-cyan-400', 'text-green-400', 
                'text-purple-400', 'text-orange-400', 'text-red-400', 'text-blue-400'
            ]
        };

        // --- Particle Effect ---
        function initParticles() {
            const container = document.getElementById('particles-container');
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `${Math.random() * 100}%`;
                p.style.animation = `float ${Math.random() * 10 + 5}s infinite ease-in-out`;
                p.style.opacity = Math.random() * 0.5;
                container.appendChild(p);
            }
        }

        // --- Real Time Clock ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('real-time').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // --- Game Engine ---
        class Game {
            constructor() {
                this.state = 'home'; // home, playing, paused, result
                this.currentLevel = 1;
                this.score = 0;
                this.timeLeft = 0;
                this.timerInterval = null;
                
                this.cards = [];
                this.flippedCards = [];
                this.matchedPairs = 0;
                this.totalPairs = 0;
                this.isLocked = false; // Lock interaction during animations
                this.comboStreak = 0;
                this.moves = 0;
            }

            // --- Navigation ---
            startLevel(levelId) {
                this.currentLevel = levelId;
                const levelData = CONFIG.levels.find(l => l.id === levelId);
                if (!levelData) return; // Max level reached?
                
                this.totalPairs = levelData.pairs;
                this.timeLeft = levelData.time;
                this.matchedPairs = 0;
                this.flippedCards = [];
                this.isLocked = false;
                this.comboStreak = 0;
                this.moves = 0;
                this.score = 0;

                this.switchScreen('game');
                this.updateHUD(levelData);
                this.generateGrid(levelData);
                this.startTimer();
                
                // Observation period (briefly show cards)
                if (levelId === 1) this.observationPhase(1500);
            }

            switchScreen(screenName) {
                document.getElementById('screen-home').classList.add('hidden');
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('modal-result').classList.add('hidden');
                document.getElementById('modal-result').classList.remove('opacity-100');
                document.getElementById('modal-pause').classList.add('hidden');

                if (screenName === 'home') {
                    document.getElementById('screen-home').classList.remove('hidden');
                } else if (screenName === 'game') {
                    document.getElementById('screen-game').classList.remove('hidden');
                    document.getElementById('screen-game').classList.add('flex');
                }
            }

            // --- Grid Generation ---
            generateGrid(levelData) {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = '';
                
                // Set Grid Columns based on level
                grid.style.gridTemplateColumns = `repeat(${levelData.cols}, minmax(0, 1fr))`;
                
                // Select Icons for this level
                let selectedIcons = [];
                // Create pairs
                for (let i = 0; i < levelData.pairs; i++) {
                    const icon = CONFIG.icons[i % CONFIG.icons.length];
                    const color = CONFIG.colors[i % CONFIG.colors.length];
                    const cardData = { id: i, icon, color };
                    selectedIcons.push(cardData);
                    selectedIcons.push({...cardData}); // Pair
                }
                
                // Shuffle
                selectedIcons.sort(() => Math.random() - 0.5);
                
                // Generate DOM
                selectedIcons.forEach((item, index) => {
                    const card = document.createElement('div');
                    // Tailwind classes for card container
                    card.className = `relative w-full aspect-[3/4] cursor-pointer group perspective-1000`;
                    card.dataset.index = index;
                    card.dataset.icon = item.icon;
                    
                    // Inner flipper
                    const flipper = document.createElement('div');
                    flipper.className = `w-full h-full relative preserve-3d transition-transform duration-500 shadow-md rounded-xl`;
                    flipper.id = `card-${index}`;
                    
                    // Front (Hidden/Back of card from user perspective initially, but we rotate logic)
                    // Let's define: "Front" is the pattern, "Back" is the logo
                    // Actually in CSS rotateY: 0 is front, 180 is back.
                    // We want start state: Show Back (Logo).
                    
                    // Card Face (The Content) - Rotated 180 initially (hidden)
                    const face = document.createElement('div');
                    face.className = `absolute inset-0 bg-midnight border-2 border-electric rounded-xl flex items-center justify-center backface-hidden rotate-y-180 glow-box`;
                    face.innerHTML = `<i class="fas ${item.icon} ${item.color} text-3xl drop-shadow-md"></i>`;
                    
                    // Card Back (The Cover) - Rotated 0 initially (visible)
                    const back = document.createElement('div');
                    back.className = `absolute inset-0 bg-slate rounded-xl flex items-center justify-center backface-hidden border border-white/5 hover:border-mint/50 transition-colors`;
                    back.innerHTML = `<i class="fas fa-fingerprint text-white/10 text-2xl"></i>`;

                    flipper.appendChild(face);
                    flipper.appendChild(back);
                    card.appendChild(flipper);
                    
                    card.addEventListener('click', () => this.flipCard(card, flipper, item));
                    grid.appendChild(card);
                });
            }

            observationPhase(time) {
                this.isLocked = true;
                const cards = document.querySelectorAll('.preserve-3d');
                // Flip all to face
                cards.forEach(c => c.classList.add('rotate-y-180'));
                
                setTimeout(() => {
                    cards.forEach(c => c.classList.remove('rotate-y-180'));
                    this.isLocked = false;
                }, time);
            }

            // --- Core Gameplay Logic ---
            flipCard(cardEl, flipper, item) {
                if (this.isLocked) return;
                if (flipper.classList.contains('rotate-y-180')) return; // Already flipped
                if (this.flippedCards.length >= 2) return;

                // Flip Animation
                flipper.classList.add('rotate-y-180');
                // Haptic feedback simulation (visual)
                navigator.vibrate?.(10);

                this.flippedCards.push({ el: cardEl, flipper: flipper, data: item });

                if (this.flippedCards.length === 2) {
                    this.moves++;
                    document.getElementById('moves-display').innerText = this.moves;
                    this.checkMatch();
                }
            }

            checkMatch() {
                this.isLocked = true;
                const [c1, c2] = this.flippedCards;

                if (c1.data.icon === c2.data.icon) {
                    // MATCH!
                    this.handleMatch(c1, c2);
                } else {
                    // MISMATCH
                    this.handleMismatch(c1, c2);
                }
            }

            handleMatch(c1, c2) {
                this.matchedPairs++;
                this.comboStreak++;
                
                // Calculate Score
                const basePoints = 100;
                const comboBonus = (this.comboStreak > 1) ? (this.comboStreak * 50) : 0;
                this.score += basePoints + comboBonus;
                this.updateScoreHUD();

                // Combo UI
                if (this.comboStreak > 1) {
                    this.showComboUI(this.comboStreak);
                }

                setTimeout(() => {
                    // Visual "Matched" state
                    c1.flipper.children[0].classList.replace('border-electric', 'border-mint');
                    c2.flipper.children[0].classList.replace('border-electric', 'border-mint');
                    c1.flipper.children[0].classList.add('glow-card-active');
                    c2.flipper.children[0].classList.add('glow-card-active');
                    
                    // Clear array and unlock
                    this.flippedCards = [];
                    this.isLocked = false;
                    document.getElementById('pairs-display').innerText = `${this.matchedPairs}/${this.totalPairs}`;

                    // Check Win
                    if (this.matchedPairs === this.totalPairs) {
                        this.endGame(true);
                    }
                }, 500);
            }

            handleMismatch(c1, c2) {
                this.comboStreak = 0;
                // Shake animation
                setTimeout(() => {
                    c1.el.classList.add('animate-shake');
                    c2.el.classList.add('animate-shake');
                    navigator.vibrate?.(50); // Error vibration
                }, 300);

                setTimeout(() => {
                    c1.flipper.classList.remove('rotate-y-180');
                    c2.flipper.classList.remove('rotate-y-180');
                    c1.el.classList.remove('animate-shake');
                    c2.el.classList.remove('animate-shake');
                    
                    this.flippedCards = [];
                    this.isLocked = false;
                }, 1000);
            }

            showComboUI(streak) {
                const el = document.getElementById('combo-indicator');
                el.innerText = `COMBO x${streak}!`;
                el.style.opacity = '1';
                el.style.transform = 'translate(-50%, -20px) scale(1.2)';
                
                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transform = 'translate(-50%, 0) scale(1)';
                }, 1500);
            }

            // --- Timer & Game Over ---
            startTimer() {
                clearInterval(this.timerInterval);
                this.updateTimerVisuals();
                
                this.timerInterval = setInterval(() => {
                    if (this.state !== 'paused') {
                        this.timeLeft--;
                        this.updateTimerVisuals();
                        
                        if (this.timeLeft <= 0) {
                            this.endGame(false);
                        }
                    }
                }, 1000);
            }

            updateTimerVisuals() {
                const levelData = CONFIG.levels.find(l => l.id === this.currentLevel);
                const percentage = (this.timeLeft / levelData.time) * 100;
                
                const bar = document.getElementById('timer-bar');
                const text = document.getElementById('timer-text');
                
                bar.style.width = `${percentage}%`;
                text.innerText = `${this.timeLeft}s`;

                // Color shift on low time
                if (percentage < 30) {
                    bar.classList.remove('from-mint', 'to-electric');
                    bar.classList.add('bg-danger');
                    text.classList.add('text-danger');
                } else {
                    bar.classList.add('from-mint', 'to-electric');
                    bar.classList.remove('bg-danger');
                    text.classList.remove('text-danger');
                }
            }

            endGame(isWin) {
                clearInterval(this.timerInterval);
                this.isLocked = true;
                
                const modal = document.getElementById('modal-result');
                const title = document.getElementById('result-title');
                const sub = document.getElementById('result-subtitle');
                const icon = document.getElementById('result-icon');
                const btnNext = document.getElementById('btn-next');
                
                modal.classList.remove('hidden');
                // Small delay for transition
                setTimeout(() => modal.classList.remove('opacity-0'), 50);

                document.getElementById('result-time').innerText = `${this.timeLeft}s`;
                document.getElementById('result-score').innerText = this.score;

                // Render Stars
                const starContainer = document.getElementById('star-container');
                starContainer.innerHTML = '';
                
                if (isWin) {
                    title.innerText = "DATA RESTORED";
                    title.classList.replace('text-danger', 'text-white');
                    sub.innerText = "Sector Secure";
                    icon.innerHTML = '<i class="fas fa-check text-2xl text-mint"></i>';
                    icon.className = "w-16 h-16 rounded-full bg-midnight border-2 border-mint mx-auto flex items-center justify-center mb-4 animate-pop";
                    
                    // Determine stars
                    const levelData = CONFIG.levels.find(l => l.id === this.currentLevel);
                    let stars = 1;
                    if (this.timeLeft > levelData.time * 0.5) stars = 3;
                    else if (this.timeLeft > levelData.time * 0.2) stars = 2;

                    for(let i=0; i<3; i++) {
                        const s = document.createElement('i');
                        s.className = `fas fa-star text-xl ${i < stars ? 'text-yellow-400' : 'text-gray-700'}`;
                        starContainer.appendChild(s);
                    }

                    // Show "Next Level" if not max
                    if (this.currentLevel < CONFIG.levels.length) {
                        btnNext.classList.remove('hidden');
                    } else {
                        btnNext.classList.add('hidden');
                        sub.innerText = "All Systems Restored (Max Level)";
                    }
                } else {
                    title.innerText = "CONNECTION LOST";
                    title.classList.replace('text-white', 'text-danger');
                    sub.innerText = "Data Fragmented";
                    icon.innerHTML = '<i class="fas fa-times text-2xl text-danger"></i>';
                    icon.className = "w-16 h-16 rounded-full bg-midnight border-2 border-danger mx-auto flex items-center justify-center mb-4 animate-pop";
                    
                    starContainer.innerHTML = '<i class="fas fa-skull text-gray-600 text-xl"></i>';
                    btnNext.classList.add('hidden');
                }
            }

            // --- Utils ---
            togglePause() {
                const modal = document.getElementById('modal-pause');
                if (this.state === 'paused') {
                    this.state = 'playing';
                    modal.classList.add('hidden');
                } else {
                    this.state = 'paused';
                    modal.classList.remove('hidden');
                }
            }

            updateHUD(levelData) {
                document.getElementById('level-display').innerText = `LVL 0${levelData.id}`;
                document.getElementById('pairs-display').innerText = `0/${levelData.pairs}`;
                document.getElementById('moves-display').innerText = '0';
                this.updateScoreHUD();
            }
            
            updateScoreHUD() {
                document.getElementById('score-display').innerText = this.score;
            }

            nextLevel() {
                this.startLevel(this.currentLevel + 1);
            }

            retryLevel() {
                this.startLevel(this.currentLevel);
            }

            goHome() {
                clearInterval(this.timerInterval);
                this.switchScreen('home');
            }
        }

        // --- Initialize ---
        initParticles();
        const game = new Game();

    </script>
</body>
</html>
